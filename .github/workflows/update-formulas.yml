name: Update formulas

on:
  schedule:
    - cron: '0 9 1 * *'  # First day of every month at 9am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check and update formulas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 - <<'PYEOF'
          import json, os, re, subprocess
          from pathlib import Path

          TOKEN = os.environ["GITHUB_TOKEN"]

          def api_get(url):
              r = subprocess.run(
                  ["curl", "-sf",
                   "-H", f"Authorization: Bearer {TOKEN}",
                   "-H", "Accept: application/vnd.github+json",
                   url],
                  capture_output=True, text=True,
              )
              return json.loads(r.stdout) if r.returncode == 0 and r.stdout else None

          def sha256_of_url(url):
              r = subprocess.run(
                  f"curl -sL {url!r} | sha256sum",
                  shell=True, capture_output=True, text=True,
              )
              return r.stdout.split()[0] if r.stdout.strip() else None

          failures = []  # collected so the job fails loudly at the end

          def git(*args, check=True):
              r = subprocess.run(["git", *args], capture_output=True, text=True)
              if check and r.returncode != 0:
                  print(f"::error::git {' '.join(args)} failed:\n{r.stderr.strip()}")
                  failures.append(f"git {args[0]}")
              return r

          def gh(*args, check=True):
              r = subprocess.run(["gh", *args], capture_output=True, text=True,
                                 env={**os.environ, "GH_TOKEN": TOKEN})
              if check and r.returncode != 0:
                  print(f"::error::gh {' '.join(args)} failed:\n{r.stderr.strip()}")
                  failures.append(f"gh {args[0]}")
              return r

          updates = []  # (path, new_content, formula_name, old_ver, new_ver)

          for formula in sorted(Path("Formula").glob("*.rb")):
              content = formula.read_text()
              name = formula.stem

              # Derive GitHub repo from homepage
              hp = re.search(r'homepage "https://github\.com/([^/"]+/[^/"]+)"', content)
              if not hp:
                  print(f"[{name}] skipping — no GitHub homepage")
                  continue

              # Current version
              ver = re.search(r'version "([^"]+)"', content)
              if not ver:
                  print(f"[{name}] skipping — no version field")
                  continue

              current = ver.group(1)
              repo    = hp.group(1)

              # Latest release from GitHub
              release = api_get(f"https://api.github.com/repos/{repo}/releases/latest")
              if not release or "tag_name" not in release:
                  print(f"[{name}] skipping — could not fetch latest release for {repo}")
                  continue

              latest = release["tag_name"].lstrip("v")

              if latest == current:
                  print(f"[{name}] up to date ({current})")
                  continue

              print(f"[{name}] {current} -> {latest}")

              # Skip if an open PR already exists for this version
              r = gh("pr", "list", "--state", "open",
                     "--search", f"Update {name} to v{latest}",
                     "--json", "number", "--jq", "length")
              if r.stdout.strip() != "0":
                  print(f"[{name}] PR already open, skipping")
                  continue

              # Recompute SHA256s from URL templates embedded in the formula
              url_templates = re.findall(r'url "([^"]+)"', content)
              new_sha256s = []
              failed = False
              for tmpl in url_templates:
                  actual_url = tmpl.replace("#{version}", latest)
                  sha = sha256_of_url(actual_url)
                  if not sha:
                      print(f"[{name}] could not hash {actual_url}, skipping")
                      failed = True
                      break
                  new_sha256s.append(sha)

              if failed:
                  continue

              # Patch version and sha256 values (in order of appearance)
              new_content = re.sub(r'version "\S+"', f'version "{latest}"', content)
              idx = [0]
              def replace_sha(m):
                  v = new_sha256s[idx[0]]; idx[0] += 1
                  return f'sha256 "{v}"'
              new_content = re.sub(r'sha256 "\S+"', replace_sha, new_content)

              updates.append((formula, new_content, name, current, latest))

          # One branch + PR per updated formula
          for formula, new_content, name, old_ver, new_ver in updates:
              branch = f"update/{name}-v{new_ver}"

              git("checkout", "main")
              git("checkout", "-b", branch)

              formula.write_text(new_content)
              git("add", str(formula))
              git("commit", "-m", f"Update {name} to v{new_ver}")
              if git("push", "origin", branch).returncode != 0:
                  print(f"[{name}] push failed, not creating PR")
                  continue

              r = gh("pr", "create",
                     "--title", f"Update {name} to v{new_ver}",
                     "--body",  f"Automated monthly update of {name} from v{old_ver} to v{new_ver}.",
                     "--base",  "main",
                     "--head",  branch)

              if r.returncode == 0:
                  print(f"[{name}] PR created: {old_ver} -> {new_ver} {r.stdout.strip()}")
              else:
                  print(f"[{name}] PR creation FAILED for {old_ver} -> {new_ver} "
                        f"(branch {branch} was pushed; open the PR manually)")

          if failures:
              raise SystemExit(f"{len(failures)} command(s) failed: {', '.join(failures)}")

          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
